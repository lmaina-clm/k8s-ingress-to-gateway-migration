# =============================================================================
# Online Boutique API Ingress
# =============================================================================
# Single Ingress exposing `frontend`. The annotations reflect a typical
# production case:
#
# - force-ssl-redirect: redirects all HTTP traffic to HTTPS
# - proxy-body-size: allows up to 10MB on POST (checkout uploads)
# - proxy-read/connect-timeout: tolerates slow responses from checkoutservice
#
# If your real Ingress has more annotations, add them here or to their
# equivalents on the Gateway (see docs/03-ingress-vs-gateway.md).
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: boutique
  namespace: microservices
  annotations:
    # Typical ingress-nginx annotations
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    # Tracking of who manages this resource
    app.kubernetes.io/managed-by: ingress-to-gateway-demo
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - shop.example.com
      secretName: shop-tls
  rules:
    - host: shop.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
