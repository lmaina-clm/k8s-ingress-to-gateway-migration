# =============================================================================
# ClientSettingsPolicy: equivalente a varias anotaciones de ingress-nginx
# =============================================================================
# Este recurso es ESPECÍFICO de NGINX Gateway Fabric (no es parte del spec
# estándar de Gateway API). Permite configurar parámetros del cliente HTTP
# que en ingress-nginx eran anotaciones.
#
# Mapeo:
#
#   nginx.ingress.kubernetes.io/proxy-body-size: "10m"
#     → spec.body.maxSize: "10m"
#
#   nginx.ingress.kubernetes.io/keep-alive: "75"
#     → spec.keepAlive.time: "75s"
#
# Para timeouts del UPSTREAM (read/connect/send), ver `NginxProxy` resource
# o `UpstreamSettingsPolicy` — distintos a ClientSettings.
# =============================================================================
apiVersion: gateway.nginx.org/v1alpha1
kind: ClientSettingsPolicy
metadata:
  name: boutique-client-settings
  namespace: gateway-system
  labels:
    app.kubernetes.io/part-of: boutique
    app.kubernetes.io/managed-by: ingress-to-gateway-demo
spec:
  # targetRef apunta al Gateway. La policy aplica a TODOS los HTTPRoutes
  # adjuntos a este Gateway. Si necesitas distintos settings por route,
  # crea policies separadas con targetRef apuntando a cada HTTPRoute.
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: boutique-gateway
  body:
    maxSize: "10m"
    # Si tu API recibe payloads en chunked transfer:
    timeout: 60s
  keepAlive:
    requests: 100
    time: 75s
    timeout:
      server: 60s
      header: 60s
