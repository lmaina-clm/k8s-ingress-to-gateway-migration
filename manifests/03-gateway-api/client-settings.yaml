# =============================================================================
# ClientSettingsPolicy: equivalent to several ingress-nginx annotations
# =============================================================================
# This resource is SPECIFIC to NGINX Gateway Fabric (not part of the standard
# Gateway API spec). It lets you configure HTTP client parameters that were
# annotations in ingress-nginx.
#
# Mapping:
#
#   nginx.ingress.kubernetes.io/proxy-body-size: "10m"
#     → spec.body.maxSize: "10m"
#
#   nginx.ingress.kubernetes.io/keep-alive: "75"
#     → spec.keepAlive.time: "75s"
#
# For UPSTREAM timeouts (read/connect/send), see the `NginxProxy` resource
# or `UpstreamSettingsPolicy` — different from ClientSettings.
# =============================================================================
apiVersion: gateway.nginx.org/v1alpha1
kind: ClientSettingsPolicy
metadata:
  name: boutique-client-settings
  namespace: gateway-system
  labels:
    app.kubernetes.io/part-of: boutique
    app.kubernetes.io/managed-by: ingress-to-gateway-demo
spec:
  # targetRef points to the Gateway. The policy applies to ALL HTTPRoutes
  # attached to this Gateway. If you need different settings per route,
  # create separate policies with targetRef pointing to each HTTPRoute.
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: boutique-gateway
  body:
    maxSize: "10m"
    # If your API receives chunked transfer payloads:
    timeout: 60s
  keepAlive:
    requests: 100
    time: 75s
    timeout:
      server: 60s
      header: 60s
