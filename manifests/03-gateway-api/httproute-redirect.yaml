# =============================================================================
# HTTPRoute para redirect HTTP → HTTPS
# =============================================================================
# Equivale a la anotación `nginx.ingress.kubernetes.io/force-ssl-redirect: "true"`.
#
# En Gateway API el redirect es explícito: declaras una ruta sobre el listener
# HTTP (puerto 80) que aplica un filter `RequestRedirect` a TODOS los requests.
# Eso es más auditable que esconderlo en una anotación.
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: boutique-https-redirect
  namespace: microservices
  labels:
    app.kubernetes.io/part-of: boutique
    app.kubernetes.io/managed-by: ingress-to-gateway-demo
spec:
  parentRefs:
    - name: boutique-gateway
      namespace: gateway-system
      # Solo al listener HTTP (puerto 80)
      sectionName: http
  hostnames:
    - shop.example.com
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            # Status 301 (permanent) o 302 (temporary). Para producción usa 301
            # para que los navegadores cacheen el redirect.
            statusCode: 301
            # Port omitido → default 443 (porque scheme=https)
