# =============================================================================
# HTTPRoute for HTTP → HTTPS redirect
# =============================================================================
# Equivalent to the `nginx.ingress.kubernetes.io/force-ssl-redirect: "true"`
# annotation.
#
# In Gateway API the redirect is explicit: you declare a route on the HTTP
# listener (port 80) that applies a `RequestRedirect` filter to ALL requests.
# That's more auditable than hiding it in an annotation.
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: boutique-https-redirect
  namespace: microservices
  labels:
    app.kubernetes.io/part-of: boutique
    app.kubernetes.io/managed-by: ingress-to-gateway-demo
spec:
  parentRefs:
    - name: boutique-gateway
      namespace: gateway-system
      # Only the HTTP listener (port 80)
      sectionName: http
  hostnames:
    - shop.example.com
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            # Status 301 (permanent) or 302 (temporary). For production use 301
            # so browsers cache the redirect.
            statusCode: 301
            # Port omitted → default 443 (because scheme=https)
