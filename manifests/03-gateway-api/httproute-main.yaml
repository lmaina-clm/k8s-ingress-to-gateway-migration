# =============================================================================
# Main HTTPRoute: equivalent to the previous Ingress
# =============================================================================
# Managed by the application team (Online Boutique).
# Lives in the `microservices` namespace, not `gateway-system`, and references
# the Gateway cross-namespace thanks to the ReferenceGrant in 00-base.
#
# Mapping from the Ingress:
#
#   Ingress.spec.rules[0].host          → hostnames[0]
#   Ingress.spec.rules[0].http.paths[0] → rules[0].matches[0]
#   pathType: Prefix                    → type: PathPrefix
#   backend.service.name=frontend       → backendRefs[0].name
#   backend.service.port.number=80      → backendRefs[0].port
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: boutique
  namespace: microservices
  labels:
    app.kubernetes.io/part-of: boutique
    app.kubernetes.io/managed-by: ingress-to-gateway-demo
spec:
  parentRefs:
    - name: boutique-gateway
      namespace: gateway-system
      # Attach only to the HTTPS listener — the HTTP listener is only for redirect
      sectionName: https
  hostnames:
    - shop.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
          # weight: 100 is the default when there's only one backend.
          # For canary traffic between versions, see the example in 04-migration/
