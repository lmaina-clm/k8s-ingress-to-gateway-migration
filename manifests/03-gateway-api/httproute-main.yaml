# =============================================================================
# HTTPRoute principal: equivale al Ingress anterior
# =============================================================================
# Este recurso lo gestiona el equipo de aplicación (Online Boutique).
# Vive en el namespace `microservices`, no en `gateway-system`, y referencia
# cross-namespace al Gateway gracias al ReferenceGrant en 00-base.
#
# Equivalencia con el Ingress:
#
#   Ingress.spec.rules[0].host          → hostnames[0]
#   Ingress.spec.rules[0].http.paths[0] → rules[0].matches[0]
#   pathType: Prefix                    → type: PathPrefix
#   backend.service.name=frontend       → backendRefs[0].name
#   backend.service.port.number=80      → backendRefs[0].port
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: boutique
  namespace: microservices
  labels:
    app.kubernetes.io/part-of: boutique
    app.kubernetes.io/managed-by: ingress-to-gateway-demo
spec:
  parentRefs:
    - name: boutique-gateway
      namespace: gateway-system
      # Adjuntar solo al listener HTTPS — el listener HTTP solo para redirect
      sectionName: https
  hostnames:
    - shop.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
          # weight: 100 es el default cuando solo hay un backend.
          # Para tráfico canary entre versiones, ver el ejemplo en 04-migration/
