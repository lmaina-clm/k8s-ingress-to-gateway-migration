# =============================================================================
# Gateway: el punto de entrada del clúster
# =============================================================================
# Este recurso lo gestiona el equipo de plataforma / SRE.
# Define los listeners (puertos + protocolos + TLS) y qué namespaces pueden
# adjuntar HTTPRoutes a este Gateway.
#
# - Listener `http`: puerto 80, solo para que los HTTPRoute redirect funcionen
# - Listener `https`: puerto 443 con TLS terminado en el Gateway
#
# El data plane (NGINX pods + NLB) lo crea NGF automáticamente al ver este
# recurso. La cantidad de replicas y configuración del data plane se ajusta
# vía NginxProxy (no en el Gateway directamente).
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: boutique-gateway
  namespace: gateway-system
  annotations:
    app.kubernetes.io/managed-by: ingress-to-gateway-demo
  labels:
    app.kubernetes.io/part-of: boutique
spec:
  gatewayClassName: nginx
  # Anotaciones de infraestructura para el NLB (vía AWS Load Balancer Controller)
  infrastructure:
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: external
      service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
      service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
      service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
      # Para health checks correctos
      service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: tcp
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: shop.example.com
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              gateway-access: "true"
    - name: https
      protocol: HTTPS
      port: 443
      hostname: shop.example.com
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            group: ""
            name: shop-tls
            # Si usas cert-manager con un Certificate en otro namespace,
            # agrega `namespace: <ns>` y crea un ReferenceGrant.
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              gateway-access: "true"
