# =============================================================================
# Gateway: the cluster's entry point
# =============================================================================
# Managed by the platform / SRE team.
# Defines the listeners (ports + protocols + TLS) and which namespaces can
# attach HTTPRoutes to this Gateway.
#
# - Listener `http`: port 80, only so the HTTPRoute redirect works
# - Listener `https`: port 443 with TLS terminated at the Gateway
#
# The data plane (NGINX pods + NLB) is created by NGF automatically when it
# sees this resource. The data plane's replica count and configuration are
# adjusted via NginxProxy (not in the Gateway directly).
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: boutique-gateway
  namespace: gateway-system
  annotations:
    app.kubernetes.io/managed-by: ingress-to-gateway-demo
  labels:
    app.kubernetes.io/part-of: boutique
spec:
  # GatewayClass created by the NGF chart with
  # `nginxGateway.gatewayClassName=nginx-gateway`. Renamed from the default
  # `nginx` to avoid confusion with `ingressClassName: nginx` during
  # coexistence.
  gatewayClassName: nginx-gateway
  # Infrastructure annotations for the NLB (via AWS Load Balancer Controller)
  infrastructure:
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: external
      service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
      service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
      service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
      # For correct health checks
      service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: tcp
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: shop.example.com
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              gateway-access: "true"
    - name: https
      protocol: HTTPS
      port: 443
      hostname: shop.example.com
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            group: ""
            name: shop-tls
            # If you use cert-manager with a Certificate in another namespace,
            # add `namespace: <ns>` and create a ReferenceGrant.
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              gateway-access: "true"
