# Kustomization for Online Boutique
#
# Applies the upstream v0.10.2 manifest and patches it with the following
# adjustments:
# - Moves everything to the `microservices` namespace
# - Removes the `frontend-external` Service (type LoadBalancer) — the upstream
#   does NOT ship any Ingress, just this LoadBalancer Service that exposes
#   the frontend directly. We remove it because public access is handled via
#   Ingress (initial state) or Gateway API (final state).
# - Applies consistent labels
#
# To pin to a different demo version, change the ref in `resources`.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: microservices

# Upstream manifest (pin the tag, do NOT use main for production)
resources:
  - https://raw.githubusercontent.com/GoogleCloudPlatform/microservices-demo/v0.10.2/release/kubernetes-manifests.yaml

# Common labels — replaces the deprecated `commonLabels` (kustomize v5+).
# `includeSelectors: true` preserves the historical behavior of injecting
# the label into Service/Deployment selectors (so they keep matching pods).
# `includeTemplates: true` propagates it to the podTemplate.
labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      app.kubernetes.io/part-of: boutique
      app.kubernetes.io/managed-by: ingress-to-gateway-demo

# Remove the direct LoadBalancer from the frontend because we expose it
# via Ingress / Gateway in other folders
patches:
  - target:
      kind: Service
      name: frontend-external
    patch: |-
      $patch: delete
      apiVersion: v1
      kind: Service
      metadata:
        name: frontend-external
