# =============================================================================
# Namespaces base
# =============================================================================
# - microservices: aloja Online Boutique y sus HTTPRoutes
# - gateway-system: aloja el Gateway + el data plane que NGF crea
# - nginx-gateway: aloja el control plane de NGF (lo crea Helm; este manifiesto
#                  está aquí solo como referencia, NO aplicar manualmente)
#
# Este archivo NO depende de los CRDs de Gateway API, así que se puede aplicar
# en cualquier momento (incluso antes de instalar NGF). Para el ReferenceGrant
# que SÍ depende de los CRDs, ver `reference-grant.yaml` y aplicarlo DESPUÉS
# de instalar Gateway API.
# =============================================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: microservices
  labels:
    # Label que el listener del Gateway usa para autorizar HTTPRoutes desde este NS
    gateway-access: "true"
    # PodSecurityStandards (ajustar a la política de tu org)
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: gateway-system
  labels:
    pod-security.kubernetes.io/enforce: baseline
