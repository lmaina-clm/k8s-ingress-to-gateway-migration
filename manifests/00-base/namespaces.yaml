# =============================================================================
# Base namespaces
# =============================================================================
# - microservices: hosts Online Boutique and its HTTPRoutes
# - gateway-system: hosts the Gateway + the data plane that NGF creates
# - nginx-gateway: hosts the NGF control plane (created by Helm; this manifest
#                  is here only for reference, do NOT apply manually)
#
# This file does NOT depend on Gateway API CRDs, so it can be applied at any
# time (even before installing NGF). For the ReferenceGrant that DOES depend
# on the CRDs, see `reference-grant.yaml` and apply it AFTER installing
# Gateway API.
# =============================================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: microservices
  labels:
    # Label the Gateway's listener uses to authorize HTTPRoutes from this NS
    gateway-access: "true"
    # PodSecurityStandards (adjust to your org's policy)
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: gateway-system
  labels:
    pod-security.kubernetes.io/enforce: baseline
