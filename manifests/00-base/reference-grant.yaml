# =============================================================================
# ReferenceGrant
# =============================================================================
# Allows HTTPRoutes in `microservices` to reference the Gateway in
# `gateway-system`. Without this, cross-namespace references are rejected
# (Gateway API's security model).
#
# ⚠️ This resource requires Gateway API CRDs to be installed already.
# Apply AFTER `kubectl apply -f https://.../standard-install.yaml` or
# after running `scripts/install-nginx-gateway-fabric.sh`.
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-microservices-to-use-gateway
  namespace: gateway-system
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: microservices
  to:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: boutique-gateway
